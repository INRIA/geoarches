name: Integration tests

# Trigger on push or pull request to main and dev branches
on: 
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  integration-test:
    name: Run integration tests on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]  # Start with Linux only for integration tests
        python-version: ['3.11']  # Use stable version for integration
    
    steps:
      #----------------------------------------------
      #       check-out repo and set-up python
      #----------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      #----------------------------------------------
      #  -----  install & configure poetry  -----
      #----------------------------------------------
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
      
      #----------------------------------------------
      #       load cached venv if cache exists
      #----------------------------------------------
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-integration-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      
      #----------------------------------------------
      # install dependencies if cache does not exist
      #----------------------------------------------
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root
      
      #----------------------------------------------
      #    install your root project
      #----------------------------------------------
      - name: Install project
        run: poetry install --no-interaction
      
      #----------------------------------------------
      #        download minimal stats data
      #----------------------------------------------
      - name: Create minimal stats data
        run: |
          mkdir -p geoarches/stats
          # Create a minimal stats file for testing (will be overridden by test fixtures)
          touch geoarches/stats/era5-quantiles-2016_2022.nc
      
      #----------------------------------------------
      #       run integration tests
      #----------------------------------------------
      - name: Run integration tests
        run: |
          source .venv/bin/activate
          python -m pytest -v tests/integration/ -s
        timeout-minutes: 15
      
      #----------------------------------------------
      #    upload test artifacts if failed
      #----------------------------------------------
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-artifacts-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            modelstore/
            wandblogs/
            tests/integration/